name: Android UI Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  android-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Android SDK
        uses: android-actions/setup-android@v3

      - name: Create Android emulator (Pixel 7, Android 15 / API 35)
        run: |
          sdkmanager "system-images;android-35;google_apis;x86_64"
          echo "no" | avdmanager create avd -n pixel7 -k "system-images;android-35;google_apis;x86_64" --device "pixel_7"

      - name: Start emulator
        run: |
          nohup emulator -avd pixel7 -no-snapshot -noaudio -no-boot-anim -no-window &
          adb wait-for-device
          adb shell input keyevent 82

      - name: Install Node & Appium
        run: |
          sudo apt-get update
          sudo apt-get install -y nodejs npm
          npm install -g appium
          appium -v

      - name: Start Appium server
        run: |
          nohup appium --log appium.log &
          sleep 5

      - name: Build with Maven
        run: mvn -B clean test

      - name: Upload ExtentReport
        uses: actions/upload-artifact@v4
        with:
          name: extent-report
          path: Reports/TestReport.html

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: Reports/screenshots/

      - name: Upload Appium log
        uses: actions/upload-artifact@v4
        with:
          name: appium-log
          path: appium.log
